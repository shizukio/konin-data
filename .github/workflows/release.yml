name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10.31.0

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate data
        run: pnpm generate

      - name: Verify generated files
        run: git diff --exit-code

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "KONIN Data ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            catalog.json
            metadata.json
            manifest.json
            subjects.json